{% load static %}
<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title>Platform Rules</title>
  <style>
    @page {
      margin: 24mm 18mm;
    }

    body {
      font-family: DejaVu Sans, Arial, sans-serif;

      color: #111;
    }

    h1 {
      font-size: 18pt;
      margin: 0 0 8pt 0;

    h2 {

    }

      margin: 0 0 0 16pt;

    .section {
